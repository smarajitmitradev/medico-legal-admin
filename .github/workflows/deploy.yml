name: 🚀 Deploy Laravel

on:
push:
branches:
- main
- staging

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: 🔑 Setup SSH
    run: |
      mkdir -p ~/.ssh
      echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa

  - name: 🚀 Deploy to Server
    run: |
      ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF

      if [ "${GITHUB_REF##*/}" = "main" ]; then
        cd ~/domains/lawcription.in/public_html/medico-legal-admin/main

        git pull origin main

        composer install --no-dev --optimize-autoloader

        php artisan migrate --force
        php artisan config:cache

      elif [ "${GITHUB_REF##*/}" = "staging" ]; then
        cd ~/domains/lawcription.in/public_html/medico-legal-admin/staging

        git pull origin staging

        composer install

        php artisan migrate
        php artisan config:clear

      fi

      EOF
```
